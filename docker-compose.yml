version: "3.9"

networks:
  unenter:
    driver: bridge

volumes:
  unt-db-data:
  unt-storage-data:
  # unt-ink-modules and unt-tui-modules removed — TUI now runs natively via Bun (tui/run.ps1)

services:

  db:
    image: supabase/postgres:15.8.1.060
    container_name: unt_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: supabase_admin
    volumes:
      - unt-db-data:/var/lib/postgresql/data
      - ./supabase/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - unenter

  kong:
    image: kong:2.8.1
    container_name: unt_kong
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,ip-restriction
      KONG_LOG_LEVEL: warn
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unenter

  auth:
    image: supabase/gotrue:v2.151.0
    container_name: unt_auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-https://unenter.live}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-https://unenter.live}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-unenter.live}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_LOG_LEVEL: warn
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unenter

  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: unt_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_LOG_LEVEL: warn
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unenter

  realtime:
    image: supabase/realtime:v2.25.50
    container_name: unt_realtime
    restart: unless-stopped
    ports:
      - "4001:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      ANON_KEY: ${ANON_KEY}
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unenter

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: unt_imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
    volumes:
      - unt-storage-data:/var/lib/storage:ro
    networks:
      - unenter

  storage:
    image: ghcr.io/supabase/storage-api:v1.37.8
    container_name: unt_storage
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_SIZE_LIMIT: 52428800
      TENANT_ID: ${STORAGE_TENANT_ID:-stub}
      REGION: ${REGION:-us-east-1}
      S3_PROTOCOL_ACCESS_KEY_ID: ${S3_PROTOCOL_ACCESS_KEY_ID}
      S3_PROTOCOL_ACCESS_KEY_SECRET: ${S3_PROTOCOL_ACCESS_KEY_SECRET}
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - unt-storage-data:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      imgproxy:
        condition: service_started
    networks:
      - unenter

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: unt_meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unenter

  studio:
    image: supabase/studio:latest
    container_name: unt_studio
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-unenter}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-unenter.live}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8001
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      STORAGE_IMGPROXY_URL: http://imgproxy:5001
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
      meta:
        condition: service_started
    networks:
      - unenter

  # ── Reverse proxy ─────────────────────────────────────────────────────────────
  # Routes requests to the correct zone by Host header (subdomain).
  # In monolith mode all zones point to unt_app:3000.
  # To split a zone, add a new app service and update the matching UPSTREAM_*
  # environment variable below.
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: unt_proxy
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      PROXY_PORT:         "3080"
      CORE_DOMAIN:        "${CORE_DOMAIN:-unenter.live}"
      UPSTREAM_UNENTER:   "http://unt_app:3000"
      UPSTREAM_BLOG:      "http://blog:3000"
      UPSTREAM_DASHBOARD: "http://unt_app:3000"
      UPSTREAM_SHOP:      "http://shop:3000"
      UPSTREAM_APP:       "http://unt_app:3000"
      UPSTREAM_AUTH:      "http://authzone:3000"
      UPSTREAM_TEST3:  "http://test3:3000"
      # Split example — uncomment + add new app service when ready:
      # UPSTREAM_DASHBOARD: "http://unt_dashboard:3001"
    depends_on:
      app:
        condition: service_healthy
      blog:
        condition: service_healthy
      shop:
        condition: service_healthy
      authzone:
        condition: service_healthy
      test3:
        condition: service_healthy
    networks:
      - unenter

  # ── Zone services ─────────────────────────────────────────────────────────────
  # All four zones share the same .env via env_file — one file rules them all.
  #
  # env_file injects every var from .env into the container at runtime.
  # build.args uses bare names (no value) so docker-compose resolves them
  # from .env automatically — add a new NEXT_PUBLIC_* to .env once and it
  # flows to every zone build without touching this file.
  #
  # The only per-zone overrides are:
  #   NEXT_PUBLIC_ZONE  — zone identity, differs per service
  #   STRIPE_*          — shop-only secrets (already in .env, injected via env_file)
  # ──────────────────────────────────────────────────────────────────────────────

  app:
    image: ghcr.io/makeouthillx32/unenter:latest
    container_name: unt_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-127.0.0.1:3000}:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_ZONE: "unenter"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    networks:
      - unenter

  blog:
    build:
      context: .
      dockerfile: zones/blog/Dockerfile
      args:
        # Bare name = resolved from .env by docker-compose automatically.
        # Add new NEXT_PUBLIC_* to .env, then add its name here — no value needed.
        NEXT_PUBLIC_SUPABASE_URL:
        NEXT_PUBLIC_SUPABASE_URL_BROWSER:
        NEXT_PUBLIC_SUPABASE_ANON_KEY:
        NEXT_PUBLIC_APP_TITLE:
        NEXT_PUBLIC_COMPANY_NAME:
        NEXT_PUBLIC_OWNER_USERNAME:
        NEXT_PUBLIC_OWNER_EMAIL:
    container_name: unt_blog
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_ZONE: "blog"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    networks:
      - unenter

  shop:
    build:
      context: .
      dockerfile: zones/shop/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:
        NEXT_PUBLIC_SUPABASE_URL_BROWSER:
        NEXT_PUBLIC_SUPABASE_ANON_KEY:
        NEXT_PUBLIC_APP_TITLE:
        NEXT_PUBLIC_COMPANY_NAME:
        NEXT_PUBLIC_OWNER_USERNAME:
        NEXT_PUBLIC_OWNER_EMAIL:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:
    container_name: unt_shop
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_ZONE: "shop"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    networks:
      - unenter

  authzone:
    build:
      context: .
      dockerfile: zones/auth/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:
        NEXT_PUBLIC_SUPABASE_URL_BROWSER:
        NEXT_PUBLIC_SUPABASE_ANON_KEY:
        NEXT_PUBLIC_APP_TITLE:
        NEXT_PUBLIC_COMPANY_NAME:
        NEXT_PUBLIC_OWNER_USERNAME:
        NEXT_PUBLIC_OWNER_EMAIL:
    container_name: unt_auth_zone
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_ZONE: "auth"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    networks:
      - unenter
  test3:
    # image: the GHCR-published tag this zone builds to.  Without this line,
    # 'docker compose pull' is a no-op ("Skipped No image to be pulled") and
    # 'docker compose up' falls back to '{project}-{service}:latest' (e.g.
    # 'webbymk2-test3:latest') which is NOT what our TUI build produces —
    # the TUI tags builds as ghcr.io/makeouthillx32/unenter-test3:latest.  Missing this line was the exact
    # cause of "No such image: webbymk2-test3:latest" on first deploy.
    image: ghcr.io/makeouthillx32/unenter-test3:latest
    build:
      context: .
      dockerfile: zones/test3/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:
        NEXT_PUBLIC_SUPABASE_URL_BROWSER:
        NEXT_PUBLIC_SUPABASE_ANON_KEY:
        NEXT_PUBLIC_APP_TITLE:
        NEXT_PUBLIC_COMPANY_NAME:
        NEXT_PUBLIC_OWNER_USERNAME:
        NEXT_PUBLIC_OWNER_EMAIL:
    container_name: unt_test3
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_ZONE: "test3"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    networks:
      - unenter
















